spring.application.name=controleEstoque



# 1. Configurações de Conexão do Banco

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Drive

#Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# 3. Execução
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# LLM (gemini)
gemini.api.key=${API_KEY}
gemini.api.url=${API_URL}

# trancrição de texto via serviço whisper
transcription.service.url=${TRANSCRIPTION_URL}

